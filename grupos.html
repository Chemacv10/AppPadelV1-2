<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Grupos — Escuela de Pádel</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page">

  <div id="header-container"></div>
  <nav id="nav-container"></nav>

  <main class="content">
    <div class="filter-label">Nivel</div>
    <div class="filters f4">
      <div class="fbtn active" data-value="" onclick="sf(this)"><img src="icons/todos.png"><div class="flabel">Todos</div></div>
      <div class="fbtn" data-value="Principiante" onclick="sf(this)"><img src="icons/principiante.png"><div class="flabel">Princ.</div></div>
      <div class="fbtn" data-value="Intermedio"   onclick="sf(this)"><img src="icons/intermedio.png"><div class="flabel">Inter.</div></div>
      <div class="fbtn" data-value="Avanzado"     onclick="sf(this)"><img src="icons/avanzado.png"><div class="flabel">Avanz.</div></div>
    </div>

    <div class="sec">
      <img src="icons/grupos.png">
      <div class="sec-title">Grupos</div>
      <div class="sec-count" id="contador">—</div>
    </div>

    <div id="lista-grupos"><div class="loading"><div class="spinner"></div></div></div>
  </main>

  <button class="fab" onclick="abrirNuevo()">+</button>

  <!-- Sheet grupo -->
  <div class="overlay" id="sh-grupo">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title" id="sh-titulo">Nuevo grupo</div>
      <input type="hidden" id="gr-id">
      <div class="fgrp">
        <div class="flbl">Nombre</div>
        <input class="finp" id="gr-nombre" placeholder="Ej: Grupo A">
      </div>
      <div class="frow">
        <div class="fgrp">
          <div class="flbl">Nivel</div>
          <select class="fsel" id="gr-nivel">
            <option>Principiante</option>
            <option>Intermedio</option>
            <option>Avanzado</option>
          </select>
        </div>
        <div class="fgrp">
          <div class="flbl">Pista</div>
          <input class="finp" id="gr-pista" placeholder="Pista 1">
        </div>
      </div>
      <div class="fgrp">
        <div class="flbl">Días</div>
        <input class="finp" id="gr-dias" placeholder="Ej: L·X·V">
      </div>
      <div class="frow">
        <div class="fgrp">
          <div class="flbl">Hora inicio</div>
          <input class="finp" id="gr-inicio" type="time" value="10:00">
        </div>
        <div class="fgrp">
          <div class="flbl">Hora fin</div>
          <input class="finp" id="gr-fin" type="time" value="11:30">
        </div>
      </div>
      <div class="sheet-btns">
        <button class="sbtn" onclick="closeSheet('sh-grupo')">Cancelar</button>
        <button class="sbtn prim" onclick="guardar()">✓ Guardar</button>
      </div>
    </div>
  </div>

  <div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-box">
      <div class="confirm-titulo">¿Eliminar grupo?</div>
      <div class="confirm-texto" id="confirm-texto"></div>
      <div class="confirm-btns">
        <button class="cbtn" onclick="document.getElementById('confirm-overlay').classList.remove('open')">Cancelar</button>
        <button class="cbtn danger" id="confirm-ok">Eliminar</button>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/store.js"></script>
<script src="js/ui.js"></script>
<script>
let _grupos  = [];
let _filtro  = '';
let _alumnosGrupo = {};

function sf(btn) {
  btn.closest('.filters').querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  _filtro = btn.dataset.value || '';
  filtrar();
}

function filtrar() {
  const lista = _grupos.filter(g => !_filtro || g.nivel === _filtro);
  renderLista(lista);
}

const COLORES = ['#2563eb','#16a34a','#f59e0b','#e05a5a','#7c3aed','#0891b2'];
function colorGrupo(nombre) {
  let h = 0;
  for (let c of nombre) h = c.charCodeAt(0) + ((h<<5)-h);
  return COLORES[Math.abs(h) % COLORES.length];
}
function abrev(nombre) {
  return nombre.replace('Grupo ','G').replace('grupo ','G').substring(0,2).toUpperCase();
}

function renderAlumnos(grupoId, color) {
  const als = _alumnosGrupo[grupoId] || [];
  if (!als.length) return '<div style="font-size:11px;color:var(--sutil)">Sin alumnos asignados</div>';
  return `<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px">` +
    als.map(a => `<span style="background:${color};color:#fff;border-radius:18px;padding:2px 9px;font-size:10px;font-weight:800">${a.nombre}</span>`).join('') +
    `</div>`;
}

function renderLista(grupos) {
  document.getElementById('contador').textContent = grupos.length;
  const el = document.getElementById('lista-grupos');
  if (!grupos.length) { showEmpty('lista-grupos','Sin grupos'); return; }
  el.innerHTML = grupos.map(g => {
    const color = colorGrupo(g.nombre);
    return `
    <div class="card" id="card-${g.id}">
      <div class="card-main" onclick="toggleCard('${g.id}')">
        <div class="av sq" style="background:${color}">${abrev(g.nombre)}</div>
        <div class="ci">
          <div class="cn">${g.nombre}</div>
          <div class="cm">
            ${chipNivel(g.nivel)}
            ${g.dias ? `<span class="chip cam">${g.dias}</span>` : ''}
            ${g.hora_inicio ? `<span class="chip cgr">${g.hora_inicio}–${g.hora_fin}</span>` : ''}
          </div>
        </div>
        <div class="chev" id="chev-${g.id}">▼</div>
      </div>
      <div class="exp" id="exp-${g.id}">
        ${g.pista ? `<div class="dl">Pista</div><div class="dv">${g.pista}</div>` : ''}
        <div class="dl">Alumnos</div>
        ${renderAlumnos(g.id, color)}
        <div class="abtns">
          <button class="abtn prim" onclick="abrirEditar(${JSON.stringify(g).replace(/"/g,'&quot;')})">✏️ Editar</button>
          <button class="abtn dang" onclick="confirmarEliminar('${g.id}','${g.nombre}')">🗑 Eliminar</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function abrirNuevo() {
  document.getElementById('sh-titulo').textContent = 'Nuevo grupo';
  ['gr-id','gr-nombre','gr-pista','gr-dias'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('gr-nivel').value  = 'Principiante';
  document.getElementById('gr-inicio').value = '10:00';
  document.getElementById('gr-fin').value    = '11:30';
  openSheet('sh-grupo');
}

function abrirEditar(g) {
  document.getElementById('sh-titulo').textContent = 'Editar grupo';
  document.getElementById('gr-id').value     = g.id;
  document.getElementById('gr-nombre').value = g.nombre;
  document.getElementById('gr-nivel').value  = g.nivel;
  document.getElementById('gr-pista').value  = g.pista  || '';
  document.getElementById('gr-dias').value   = g.dias   || '';
  document.getElementById('gr-inicio').value = g.hora_inicio || '10:00';
  document.getElementById('gr-fin').value    = g.hora_fin    || '11:30';
  openSheet('sh-grupo');
}

async function guardar() {
  const nombre = document.getElementById('gr-nombre').value.trim();
  if (!nombre) { toast('Escribe el nombre del grupo','warn'); return; }
  const grupo = {
    id:          document.getElementById('gr-id').value || undefined,
    nombre,
    nivel:       document.getElementById('gr-nivel').value,
    pista:       document.getElementById('gr-pista').value.trim(),
    dias:        document.getElementById('gr-dias').value.trim(),
    hora_inicio: document.getElementById('gr-inicio').value,
    hora_fin:    document.getElementById('gr-fin').value,
  };
  try {
    await saveGrupo(grupo);
    closeSheet('sh-grupo');
    toast('Grupo guardado','ok');
    await cargar();
  } catch(e) { toast('Error al guardar','err'); console.error(e); }
}

function confirmarEliminar(id, nombre) {
  document.getElementById('confirm-texto').textContent = `¿Eliminar "${nombre}"?`;
  document.getElementById('confirm-overlay').classList.add('open');
  document.getElementById('confirm-ok').onclick = async () => {
    document.getElementById('confirm-overlay').classList.remove('open');
    try { await deleteGrupo(id); toast('Grupo eliminado','ok'); await cargar(); }
    catch(e) { toast('Error al eliminar','err'); }
  };
}

async function cargar() {
  showLoading('lista-grupos');
  _grupos = await getGrupos();
  // Cargar alumnos de cada grupo en paralelo
  await Promise.all(_grupos.map(async g => {
    _alumnosGrupo[g.id] = await getAlumnosDeGrupo(g.id);
  }));
  filtrar();
}

async function init() {
  renderHeader({ titulo:'Escuela de Pádel', subtitulo:'Grupos', icono:'icons/grupos.png', botonDerecho:'menu' });
  renderNav('grupos');
  await initStore();
  await cargar();
}
init();
</script>
</body>
</html>
