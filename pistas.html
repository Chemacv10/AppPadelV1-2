<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Pistas — Escuela de Pádel</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .semana-card{background:var(--card);border-radius:12px;margin-bottom:8px;border:1.5px solid var(--borde);overflow:hidden;cursor:pointer}
    .semana-card:hover{border-color:#93c5fd}
    .semana-hdr{padding:11px 13px;display:flex;align-items:center;gap:8px}
    .semana-fechas{font-size:13px;font-weight:900;color:var(--texto)}
    .semana-sub{font-size:10px;color:var(--sutil);font-weight:600;margin-top:1px}
    .semana-preview{padding:0 13px 11px;display:flex;gap:5px;flex-wrap:wrap}
    .prev-pista{background:#f8fafc;border-radius:8px;padding:5px 9px;font-size:10px;font-weight:800;color:#475569;border:1px solid var(--borde)}
    .prev-bloque{background:var(--azul);color:#fff;border-radius:6px;padding:2px 7px;font-size:9px;font-weight:800;margin-left:3px}
  </style>
</head>
<body>
<div class="page">
  <div id="header-container"></div>
  <nav id="nav-container"></nav>

  <main class="content">
    <div class="sec">
      <img src="icons/pistas.png">
      <div class="sec-title">Pistas</div>
      <div class="sec-count" id="contador">—</div>
    </div>

    <div id="lista-semanas"><div class="loading"><div class="spinner"></div></div></div>
  </main>

  <button class="fab" onclick="openSheet('sh-semana')">+</button>

  <!-- Sheet nueva semana -->
  <div class="overlay" id="sh-semana">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">Nueva semana</div>
      <div class="fgrp">
        <div class="flbl">Fecha inicio (lunes)</div>
        <input class="finp" id="se-fecha" type="date">
      </div>
      <div class="fgrp">
        <div class="flbl">Número de pistas</div>
        <select class="fsel" id="se-pistas">
          <option value="1">1 pista</option>
          <option value="2">2 pistas</option>
          <option value="3" selected>3 pistas</option>
          <option value="4">4 pistas</option>
        </select>
      </div>
      <div class="sheet-btns">
        <button class="sbtn" onclick="closeSheet('sh-semana')">Cancelar</button>
        <button class="sbtn prim" onclick="crearSemana()">✓ Crear semana</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/store.js"></script>
<script src="js/ui.js"></script>
<script>
let _semanas = [];

function formatRango(inicio) {
  if (!inicio) return '—';
  const d = new Date(inicio);
  const fin = new Date(d); fin.setDate(fin.getDate()+6);
  const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${d.getDate()} ${meses[d.getMonth()]} — ${fin.getDate()} ${meses[fin.getMonth()]} ${fin.getFullYear()}`;
}

function contarBloquesPorPista(bloques, numPistas) {
  const counts = {};
  for (let i=1; i<=numPistas; i++) counts[`Pista ${i}`] = 0;
  (bloques||[]).forEach(b => { if (counts[b.pista]!==undefined) counts[b.pista]++; });
  return counts;
}

function renderLista(semanas) {
  document.getElementById('contador').textContent = semanas.length;
  const el = document.getElementById('lista-semanas');
  if (!semanas.length) { showEmpty('lista-semanas','Sin semanas registradas\nUsa el botón + para crear la primera'); return; }
  el.innerHTML = semanas.map(s => {
    const counts = contarBloquesPorPista(s.bloques_pista, s.num_pistas||3);
    const totalBloques = Object.values(counts).reduce((a,b)=>a+b,0);
    const previews = Object.entries(counts).map(([p,n]) =>
      `<div class="prev-pista">${p} <span class="prev-bloque">${n}</span></div>`).join('');
    return `
    <div class="semana-card" onclick="window.location.href='pistas-interior.html?id=${s.id}'">
      <div class="semana-hdr">
        <div style="width:38px;height:38px;background:#eff6ff;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <img src="icons/pistas.png" style="width:28px;height:28px;object-fit:contain">
        </div>
        <div style="flex:1">
          <div class="semana-fechas">${formatRango(s.fecha_inicio)}</div>
          <div class="semana-sub">${s.num_pistas||3} pistas · ${totalBloques} bloques</div>
        </div>
        <div style="font-size:14px;color:var(--sutil)">›</div>
      </div>
      <div class="semana-preview">${previews}</div>
    </div>`;
  }).join('');
}

function proximoLunes() {
  const d = new Date();
  const dia = d.getDay();
  const diff = dia===0 ? 1 : (8-dia)%7||7;
  d.setDate(d.getDate()+diff);
  return d.toISOString().slice(0,10);
}

async function crearSemana() {
  const fecha = document.getElementById('se-fecha').value;
  if (!fecha) { toast('Selecciona la fecha de inicio','warn'); return; }
  const semana = {
    fecha_inicio: fecha,
    num_pistas:   parseInt(document.getElementById('se-pistas').value),
  };
  try {
    const s = await saveSemana(semana);
    closeSheet('sh-semana');
    toast('Semana creada','ok');
    window.location.href = `pistas-interior.html?id=${s.id}`;
  } catch(e) { toast('Error al crear','err'); console.error(e); }
}

async function cargar() {
  showLoading('lista-semanas');
  _semanas = await getSemanasPista();
  renderLista(_semanas);
}

async function init() {
  renderHeader({ titulo:'Escuela de Pádel', subtitulo:'Pistas', icono:'icons/pistas.png', botonDerecho:'menu' });
  renderNav('pistas');
  document.getElementById('se-fecha').value = proximoLunes();
  await initStore();
  await cargar();
}
init();
</script>
</body>
</html>
